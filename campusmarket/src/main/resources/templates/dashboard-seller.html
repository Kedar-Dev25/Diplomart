<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Seller Dashboard</title>
</head>
<body style="font-family: Arial, sans-serif; padding: 20px;">

    <div style="display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0;">
        
        <h2 style="margin: 0;">Welcome, Seller! <span th:text="${session.loggedInUserName}"></span></h2>

        <div style="display: flex; flex-direction: column; gap: 8px; align-items: flex-end;">
            <form action="/api/auth/logout" method="post" style="margin: 0;">
                <button type="submit" style="min-width: 150px; padding: 8px; cursor: pointer; border-radius: 5px; background: #f0f0f0; border: 1px solid #ccc;">
                    Logout
                </button>
            </form>
            
            <form action="/dashboardBuyer" method="get" style="margin: 0;">
                <button type="submit" style="min-width: 150px; padding: 8px; cursor: pointer; border-radius: 5px; background: #e0e0e0; border: 1px solid #ccc; white-space: nowrap;">
                    🛒 Switch to Buying
                </button>
            </form>
        </div>
    </div>

    <hr>

    <h3>Sell Your Lab Equipment / Books</h3>
    
    <form action="/api/products/add" method="post" enctype="multipart/form-data" 
          style="max-width: 400px; border: 1px solid #ccc; padding: 15px; border-radius: 8px; background: #f9f9f9;">
        
        <label>Product Name:</label><br>
        <input type="text" name="name" required style="width: 100%; margin-bottom: 15px; padding: 5px;"><br>
        
        <label>Price (How much you want):</label><br>
        <input type="number" name="price" required style="width: 100%; margin-bottom: 15px; padding: 5px;"><br>

        <label>Product Image:</label><br>
        <input type="file" name="imageFile" accept="image/*" required style="margin-bottom: 15px;"><br>

        <label>Description (Condition of item):</label><br>
        <textarea name="description" style="width: 100%; margin-bottom: 15px; height: 80px; padding: 5px;"></textarea><br>

        <button type="submit" style="background-color: #28a745; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; width: 100%;">
            🚀 Post Product
        </button>
    </form>

    <hr>

    <h3>Your Listed Items</h3>
    <table border="1" style="width: 100%; border-collapse: collapse; text-align: left;">
        <tr style="background-color: #f2f2f2;">
            <th style="padding: 10px;">Item</th>
            <th style="padding: 10px;">Your Price</th>
            <th style="padding: 10px;">Status</th>
        </tr>
        <tr th:each="p : ${sellerProducts}">
            <td style="padding: 10px;" th:text="${p.name}">Mini Drafter</td>
            <td style="padding: 10px;">₹<span th:text="${p.price}">250</span></td>
            <td style="padding: 10px;" th:text="${p.status}">Available</td>
        </tr>
    </table>

</body>

</html>
